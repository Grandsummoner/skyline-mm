  <circle cx="15" cy="15" r="2" fill="#888"/>
  <line x1="11" y1="15" x2="19" y2="15" stroke="#777" stroke-width="1"/>
  <line x1="15" y1="11" x2="15" y2="19" stroke="#777" stroke-width="1"/>

  <circle cx="285" cy="15" r="8" fill="#c0bdb6" stroke="#999" stroke-width="1.5"/>
  <circle cx="285" cy="15" r="2" fill="#888"/>
  <line x1="281" y1="15" x2="289" y2="15" stroke="#777" stroke-width="1"/>
  <line x1="285" y1="11" x2="285" y2="19" stroke="#777" stroke-width="1"/>

  <circle cx="15" cy="365" r="8" fill="#c0bdb6" stroke="#999" stroke-width="1.5"/>
  <circle cx="15" cy="365" r="2" fill="#888"/>
  <line x1="11" y1="365" x2="19" y2="365" stroke="#777" stroke-width="1"/>
  <line x1="15" y1="361" x2="15" y2="369" stroke="#777" stroke-width="1"/>

  <circle cx="285" cy="365" r="8" fill="#c0bdb6" stroke="#999" stroke-width="1.5"/>
  <circle cx="285" cy="365" r="2" fill="#888"/>
  <line x1="281" y1="365" x2="289" y2="365" stroke="#777" stroke-width="1"/>
  <line x1="285" y1="361" x2="285" y2="369" stroke="#777" stroke-width="1"/>

  <!-- ══════════════════════════════════════
