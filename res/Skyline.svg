  <circle cx="14"  cy="68" r="2.5" fill="#555"/>

  <circle cx="53"  cy="68" r="13" fill="#a8a5a0" stroke="#888" stroke-width="1.5"/>
  <circle cx="53"  cy="68" r="8"  fill="#111"/>
  <circle cx="53"  cy="68" r="2.5" fill="#555"/>

  <circle cx="92"  cy="68" r="13" fill="#a8a5a0" stroke="#888" stroke-width="1.5"/>
  <circle cx="92"  cy="68" r="8"  fill="#111"/>
  <circle cx="92"  cy="68" r="2.5" fill="#555"/>

  <circle cx="131" cy="68" r="13" fill="#a8a5a0" stroke="#888" stroke-width="1.5"/>
