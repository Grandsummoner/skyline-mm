<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!--
  Skyline VCV Rack Panel  —  20HP  (300 × 380 px)
  Redesigned: even 8-column grid, labels repositioned, no overflow
  SVG uses only basic primitives (nanosvg compatible)
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="300" height="380"
     viewBox="0 0 300 380" version="1.1">

