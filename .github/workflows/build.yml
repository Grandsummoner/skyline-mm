name: Build VCV Plugin

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download Rack SDK
        shell: bash
        run: |
          curl -sLo rack-sdk.zip "https://vcvrack.com/downloads/Rack-SDK-2.6.0-win-x64.zip"
          unzip -q rack-sdk.zip

      - name: Check createPanel
        shell: bash
        run: grep -n "createPanel" $(pwd)/Rack-SDK/include/helpers.hpp | head -20

      - name: Build
        shell: bash
        run: |
          export RACK_DIR=$(pwd)/Rack-SDK
          make RACK_DIR=$(pwd)/Rack-SDK

      - name: Package
        shell: bash
        run: |
          export RACK_DIR=$(pwd)/Rack-SDK
          make dist RACK_DIR=$(pwd)/Rack-SDK

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-windows
          path: dist/
