name: Build VCV Plugin

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl unzip build-essential

      - name: Download Rack SDK
        run: |
          curl -sLo rack-sdk.zip "https://vcvrack.com/downloads/Rack-SDK-2.6.0-lin-x64.zip"
          unzip -q rack-sdk.zip
          echo "Extracted:"
          ls -la

      - name: Build
        run: |
          export RACK_DIR=${{ github.workspace }}/Rack-SDK
          make RACK_DIR=${{ github.workspace }}/Rack-SDK

      - name: Package
        run: |
          make dist RACK_DIR=${{ github.workspace }}/Rack-SDK

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-linux
          path: dist/
