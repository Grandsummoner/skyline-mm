name: Build MM plugin
on:
  workflow_dispatch:
    inputs:
      SDK_branch:
        description: 'MetaModule SDK branch'
        required: true
        type: choice
        default: main
        options:
          - main
      do_release:
        description: 'Create Release (must also select Tag above!)'
        required: true
        default: false
        type: boolean

jobs:
  build-lin:
    strategy:
      matrix:
        gcc: ['12.3.Rel1']
    name: "Build firmware on linux"
    runs-on: ubuntu-24.04
    steps:
      - name: Install Arm GNU Toolchain (arm-none-eabi-gcc)
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        with:
          release: ${{ matrix.gcc }}

      - name: Install cmake
        uses: jwlawson/actions-setup-cmake@v1.13
        with:
          cmake-version: '3.26.x'

      - name: Git setup
        run: git config --global --add safe.directory '*'

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Install linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install ninja-build

      - name: Set Release Version
        if: startsWith(github.ref, 'refs/tags/')
        uses: FranzDiebold/github-env-vars-action@v2

      - name: Build
        run: |
          # Create directory for the plugin to be created in:
          mkdir -p ${{ github.workspace }}/metamodule-plugins
          
          # Get the SDK:
          git clone -b ${{ inputs.SDK_branch }} https://github.com/4ms/metamodule-plugin-sdk --recursive ${{ github.workspace }}/metamodule-plugin-sdk
          
          # 1. Install CairoSVG natively via apt-get (installs all system C-libraries)
          sudo apt-get update
          sudo apt-get install -y python3-cairosvg
          
          # 2. Run the 4ms SvgToPng tool to generate assets/Skyline.png
          python3 ${{ github.workspace }}/metamodule-plugin-sdk/scripts/SvgToPng.py --input ${{ github.workspace }}/res/Skyline.svg --output ${{ github.workspace }}/assets/ --white --height 240
          
          # 3. Print assets directory contents to console to verify the PNG was created
          echo "=== VERIFYING GENERATED ASSETS ==="
          ls -la ${{ github.workspace }}/assets/
          echo "=================================="
          
